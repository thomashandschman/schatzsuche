<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Treasure chest -->
  <rect x="156" y="250" width="200" height="130" rx="16" fill="url(#gold)" stroke="#b8860b" stroke-width="8"/>
  <rect x="156" y="220" width="200" height="60" rx="16" fill="#daa520" stroke="#b8860b" stroke-width="8"/>
  <rect x="236" y="280" width="40" height="40" rx="8" fill="#b8860b"/>
  <circle cx="256" cy="300" r="10" fill="#ffd700"/>
  <!-- X mark -->
  <line x1="180" y1="140" x2="332" y2="200" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <line x1="332" y1="140" x2="180" y2="200" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="140" cy="160" r="6" fill="#ffd700" opacity="0.8"/>
  <circle cx="372" cy="150" r="4" fill="#ffd700" opacity="0.6"/>
  <circle cx="350" cy="400" r="5" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="160" cy="380" r="4" fill="#f5a623" opacity="0.6"/>
</svg>
